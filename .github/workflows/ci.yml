name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (deps + dev tools)
        run: pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest -q

  deploy:
    name: Deploy (Dokploy)
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, webhook-gateway-tailnet]
    concurrency:
      group: deploy-webhook-gateway
      cancel-in-progress: false
    steps:
      - name: Trigger Dokploy redeploy
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_URL: http://gpu-vm-1.ts:3000
          COMPOSE_ID: I5_Ypxvm1r9AnMGt1D_RY
        run: |
          set -euo pipefail
          resp=$(curl -sf -X POST "$DOKPLOY_URL/api/compose.deploy" \
            -H "x-api-key: $DOKPLOY_API_KEY" -H "Content-Type: application/json" \
            -d "{\"composeId\":\"$COMPOSE_ID\"}")
          echo "$resp"
          echo "$resp" | grep -q '"success":true'

      - name: Wait for healthy
        run: |
          for i in $(seq 1 25); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 8 https://webhook-gw.onlyarag.com/health || true)
            echo "[$((i*6))s] health -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 6
          done
          echo "service did not return 200 in time"; exit 1
